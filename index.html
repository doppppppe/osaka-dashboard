function popChange(w) {
  const p = DATA.pop[w];
  return ((p["2025"] - p["2015"]) / p["2015"]) * 100;
}
function tierOf(pct) {
  if (pct >= 10) return "surge";
  if (pct >= 3) return "up";
  if (pct > -3) return "flat";
  return "down";
}

function AreaDashboard() {
  const wards = DATA.order;
  const [focus, setFocus] = useState("주오구");
  const [compare, setCompare] = useState(["주오구", "니시구", "나니와구", "다이쇼구"]);

  const toggleCompare = (w) =>
    setCompare((cur) =>
      cur.includes(w) ? cur.filter((x) => x !== w) : [...cur, w]
    );

  const clearWards = () => setCompare([]);

  const popSeries = useMemo(() => {
    return DATA.pop_years.map((y) => {
      const row = { year: y };
      compare.forEach((w) => (row[w] = DATA.pop[w][y]));
      return row;
    });
  }, [compare]);

  const popRank = useMemo(() => {
    return wards
      .map((w) => ({ ward: w, pct: popChange(w), tier: tierOf(popChange(w)) }))
      .sort((a, b) => b.pct - a.pct);
  }, []);

    return allY.map((y) => ({
      year: y,
      housing: d[y] ? d[y].h : null,
      commercial: d[y] ? d[y].c : null,
    }));
  }, [focus]);

  // ---- 2026 변동률 랭킹 ----
  const lpc2026 = useMemo(() => {
    return wards
      .map((w) => ({ ward: w, h: DATA.lpc[w][2026].h, c: DATA.lpc[w][2026].c }))

  }, []);

  const absSeries = useMemo(() => {
    return DATA.ab_years.map((y) => {

      return row;
    });
  }, [compare]);

  // ---- 인구이동: 자연증감 vs 사회증감 (focus 구) ----
  const migSeries = useMemo(() => {
    const d = DATA.mig[focus] || {};

/* ===== 통빌딩 수익률 언더라이팅 계산기 ===== */
/* ─────────────────────────────────────────────────────────────
   통빌딩 수익률 언더라이팅 계산기 — 한국인 매수자용
   Part of the Osaka building-acquisition data project.
   모든 수치는 사용자가 입력하는 가정값이며, 실거래엔 택지건물거래사·사법서사·
   세무사 검토가 필요합니다. 취득세·등록면허세는 평가액 기준이라 개산치.
   ───────────────────────────────────────────────────────────── */

const LIGHT_UC = {
  bg: "#FAF8F4", ink: "#23201B", sub: "#6B6357", line: "#E4DDD0",
  card: "#FFFFFF", panel: "#F3EEE6",
  amber: "#D97706", blue: "#2D6FB8", red: "#C53030", teal: "#0F766E", good: "#15803D",
};
const DARK_UC = {
  bg: "#15120E", ink: "#EFE9DF", sub: "#A89E90", line: "#342F29",
  card: "#211C17", panel: "#1D1813",
  amber: "#EFA13C", blue: "#5C9BD8", red: "#E5645F", teal: "#2FA98F", good: "#4ADE80",
};
let UC = LIGHT_UC;

const yen = (n) => "¥" + Math.round(n).toLocaleString("ja-JP");
const won = (n) => "₩" + Math.round(n).toLocaleString("ko-KR");
const wonEok = (n) => (n / 1e8).toFixed(2) + "억원";
const pct = (n) => (n * 100).toFixed(2) + "%";

function NumberRow({ label, hint, value, onChange, suffix = "엔", step = 100000 }) {
  return (
    <label style={{ display: "block", marginBottom: 13 }}>
      <div style={{ fontFamily: FN, fontSize: 12.5, color: UC.ink, fontWeight: 600 }}>{label}</div>
      {hint && <div style={{ fontFamily: FN, fontSize: 10.5, color: UC.sub, marginTop: 1 }}>{hint}</div>}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 4 }}>
        <input
          type="number" value={value} step={step}
          onChange={(e) => onChange(parseFloat(e.target.value) || 0)}
          style={{
            flex: 1, fontFamily: FN, fontSize: 13.5, padding: "7px 9px",
            border: `1px solid ${UC.line}`, borderRadius: 7, background: UC.bg, color: UC.ink,
            outline: "none",
          }}
        />
        <span style={{ fontFamily: FN, fontSize: 11.5, color: UC.sub, minWidth: 26 }}>{suffix}</span>
      </div>
    </label>
  );
}

function Kpi({ label, value, sub, color = UC.ink, big }) {
  return (
    <div style={{ background: UC.panel, borderRadius: 11, padding: "13px 15px", border: `1px solid ${UC.line}` }}>
      <div style={{ fontFamily: FN, fontSize: 11, color: UC.sub, marginBottom: 3 }}>{label}</div>
      <div style={{ fontFamily: FS, fontSize: big ? 26 : 20, fontWeight: 700, color, lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ fontFamily: FN, fontSize: 10.5, color: UC.sub, marginTop: 3 }}>{sub}</div>}
    </div>
  );
}

function Underwriting() {
  // ── 입력값 (오래된 오사카 통빌딩, 중간 예산 디폴트) ──
  const [price, setPrice] = useState(350000000);   // 매입가(엔)
  const [fx, setFx] = useState(9.5);               // 1엔 = ?원 (2026-05 약 9.5원)
  const [gpi, setGpi] = useState(21000000);        // 만실 연 임대수입(현행 렌트롤 기준)
  const [vac, setVac] = useState(8);               // 공실률 %
  const [kotoze, setKotoze] = useState(1300000);   // 보유세(엔/년)
  const [pmPct, setPmPct] = useState(5);           // 관리위탁 % of EGI
  const [repPct, setRepPct] = useState(7);         // 수선·CapEx 적립 % of EGI
  const [ins, setIns] = useState(400000);          // 보험·기타(엔/년)
  const [acqPct, setAcqPct] = useState(8);         // 취득제비용 % of 매입가
  const [ltv, setLtv] = useState(0);               // 융자 LTV %
  const [rate, setRate] = useState(2.5);           // 융자 금리 %
  const [term, setTerm] = useState(25);            // 융자 기간(년)

  const m = useMemo(() => {
    const egi = gpi * (1 - vac / 100);
    const opex = kotoze + egi * (pmPct / 100) + egi * (repPct / 100) + ins;
    const noi = egi - opex;
    const acq = price * (acqPct / 100);
    const total = price + acq;
    const loan = price * (ltv / 100);
    const equity = total - loan;
    // 원리금균등 연간 상환
    const i = rate / 100 / 12, n = term * 12;
    const monthly = loan > 0 && i > 0 ? (loan * i) / (1 - Math.pow(1 + i, -n)) : loan > 0 ? loan / n : 0;
    const debtSvc = monthly * 12;
    const btcf = noi - debtSvc;
    return {
      egi, opex, noi, acq, total, loan, equity, debtSvc, btcf,
      gross: gpi / price,                  // 표면수익률
      net: noi / total,                    // 실질(NOI)수익률 (취득비 포함)
      dscr: debtSvc > 0 ? noi / debtSvc : null,
      coc: equity > 0 ? btcf / equity : 0, // 자기자본수익률
    };
  }, [price, fx, gpi, vac, kotoze, pmPct, repPct, ins, acqPct, ltv, rate, term]);

  // 민감도: 공실률별 실질수익률 & 원화 연 BTCF
  const sens = useMemo(() => {
    return [5, 8, 12, 15].map((v) => {
      const egi = gpi * (1 - v / 100);
      const opex = kotoze + egi * (pmPct / 100) + egi * (repPct / 100) + ins;
      const noi = egi - opex;
      const btcf = noi - m.debtSvc;
      return { v, net: noi / m.total, won: btcf * fx };
    });
  }, [gpi, vac, kotoze, pmPct, repPct, ins, m.total, m.debtSvc, fx]);

  const netColor = m.net >= 0.05 ? UC.good : m.net >= 0.04 ? UC.amber : UC.red;

  return (
    <div style={{ background: UC.bg, padding: "26px 22px", fontFamily: FN, color: UC.ink, minHeight: "100%" }}>
      <div style={{ maxWidth: 1080, margin: "0 auto" }}>
        {/* 헤더 */}
        <div style={{ borderBottom: `2px solid ${UC.ink}`, paddingBottom: 12, marginBottom: 20 }}>
          <div style={{ fontFamily: FN, fontSize: 11.5, letterSpacing: 2, color: UC.amber, fontWeight: 700 }}>
            물건 평가 틀
          </div>
          <h1 style={{ fontFamily: FS, fontSize: 27, fontWeight: 800, margin: "4px 0 0" }}>
            통빌딩 수익률 언더라이팅 계산기
          </h1>
          <div style={{ fontFamily: FN, fontSize: 12.5, color: UC.sub, marginTop: 5 }}>
            한국인 매수자 기준 · 표면/실질 수익률 · 취득제비용 · 융자(DSCR) · 원화 환산 · 공실 민감도
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 22, alignItems: "start" }}>
          {/* ── 입력 패널 ── */}
          <div style={{ background: UC.card, borderRadius: 13, padding: "18px 18px 8px", border: `1px solid ${UC.line}` }}>
            <div style={{ fontFamily: FS, fontSize: 15, fontWeight: 700, marginBottom: 12 }}>입력 가정</div>
            <NumberRow label="매입가" hint="건물 매매가 (제비용 제외)" value={price} onChange={setPrice} step={10000000} />
            <NumberRow label="환율" hint="1엔 = ? 원" value={fx} onChange={setFx} suffix="원/엔" step={0.1} />
            <div style={{ height: 1, background: UC.line, margin: "6px 0 13px" }} />
            <NumberRow label="만실 연 임대수입 (GPI)" hint="★ 현행 렌트롤 기준 (모집임대료 아님)" value={gpi} onChange={setGpi} step={1000000} />
            <NumberRow label="공실률" value={vac} onChange={setVac} suffix="%" step={1} />
            <div style={{ height: 1, background: UC.line, margin: "6px 0 13px" }} />
            <NumberRow label="고정자산세·도시계획세" hint="연간 (평가액 기준)" value={kotoze} onChange={setKotoze} step={100000} />
            <NumberRow label="관리위탁(PM/BM)" hint="EGI 대비" value={pmPct} onChange={setPmPct} suffix="%" step={1} />
            <NumberRow label="수선·CapEx 적립" hint="EGI 대비 (구축은 7%↑)" value={repPct} onChange={setRepPct} suffix="%" step={1} />
            <NumberRow label="보험·기타" hint="연간" value={ins} onChange={setIns} step={100000} />
            <div style={{ height: 1, background: UC.line, margin: "6px 0 13px" }} />
            <NumberRow label="취득제비용" hint="중개3%+6만×1.1, 취득세·등록면허세·인지·사법서사 (개산 7~10%)" value={acqPct} onChange={setAcqPct} suffix="%" step={1} />
            <div style={{ height: 1, background: UC.line, margin: "6px 0 13px" }} />
            <NumberRow label="융자 LTV" hint="비거주자 융자는 까다로움 (0=전액 자기자본)" value={ltv} onChange={setLtv} suffix="%" step={5} />
            <NumberRow label="융자 금리" value={rate} onChange={setRate} suffix="%" step={0.1} />
            <NumberRow label="융자 기간" value={term} onChange={setTerm} suffix="년" step={1} />
          </div>

          {/* ── 결과 ── */}
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 11, marginBottom: 11 }}>
              <Kpi label="표면수익률 (그로스)" value={pct(m.gross)} sub="연 임대수입 ÷ 매입가" color={UC.blue} />
              <Kpi label="실질(NOI)수익률" value={pct(m.net)} sub="NOI ÷ (매입가+취득비)" color={netColor} big />
              <Kpi label="자기자본수익률 (CoC)" value={pct(m.coc)} sub="세전현금흐름 ÷ 자기자본" color={UC.teal} />
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 11, marginBottom: 11 }}>
              <Kpi label="NOI (순영업이익)" value={yen(m.noi) + "/년"} sub={won(m.noi * fx) + "/년"} />
              <Kpi label="세전 현금흐름 (BTCF)" value={yen(m.btcf) + "/년"} sub={won(m.btcf * fx) + "/년"} color={m.btcf >= 0 ? UC.ink : UC.red} />
              <Kpi label="DSCR" value={m.dscr ? m.dscr.toFixed(2) + "배" : "—"} sub={m.dscr ? (m.dscr >= 1.3 ? "안정권(≥1.3)" : "주의(<1.3)") : "융자 없음"} color={m.dscr && m.dscr < 1.3 ? UC.red : UC.ink} />
            </div>

            {/* 자금구조 */}
            <div style={{ background: UC.card, borderRadius: 13, padding: "15px 18px", border: `1px solid ${UC.line}`, marginBottom: 11 }}>
              <div style={{ fontFamily: FS, fontSize: 14, fontWeight: 700, marginBottom: 9 }}>자금 구조 · 원화 환산</div>
              <URow k="총 투자액 (매입가+취득비)" v={yen(m.total)} w={wonEok(m.total * fx)} bold />
              <URow k="└ 취득제비용" v={yen(m.acq)} w={wonEok(m.acq * fx)} muted />
              <URow k="융자" v={yen(m.loan)} w={wonEok(m.loan * fx)} />
              <URow k="자기자본 (실투자)" v={yen(m.equity)} w={wonEok(m.equity * fx)} bold accent />
              <URow k="연 원리금 상환" v={m.debtSvc > 0 ? yen(m.debtSvc) : "—"} w={m.debtSvc > 0 ? wonEok(m.debtSvc * fx) : ""} muted />
            </div>

            {/* 운영 요약 */}
            <div style={{ background: UC.card, borderRadius: 13, padding: "15px 18px", border: `1px solid ${UC.line}`, marginBottom: 11 }}>
              <div style={{ fontFamily: FS, fontSize: 14, fontWeight: 700, marginBottom: 9 }}>운영 (연간)</div>
              <URow k="만실 임대수입 (GPI)" v={yen(gpi)} />
              <URow k="− 공실손실" v={"-" + yen(gpi - m.egi)} muted />
              <URow k="유효총수입 (EGI)" v={yen(m.egi)} bold />
              <URow k="− 운영비 (보유세·관리·수선·보험)" v={"-" + yen(m.opex)} muted />
              <URow k="= NOI" v={yen(m.noi)} bold accent />
            </div>

            {/* 민감도 */}
            <div style={{ background: UC.panel, borderRadius: 13, padding: "15px 18px", border: `1px solid ${UC.line}` }}>
              <div style={{ fontFamily: FS, fontSize: 14, fontWeight: 700, marginBottom: 8 }}>민감도 · 공실률 변화</div>
              <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: FN, fontSize: 12.5 }}>
                <thead>
                  <tr style={{ color: UC.sub, fontSize: 11 }}>
                    <th style={{ textAlign: "left", padding: "4px 0" }}>공실률</th>
                    <th style={{ textAlign: "right" }}>실질수익률</th>
                    <th style={{ textAlign: "right" }}>연 BTCF(원)</th>
                  </tr>
                </thead>
                <tbody>
                  {sens.map((s) => (
                    <tr key={s.v} style={{ borderTop: `1px solid ${UC.line}`, background: s.v === vac ? "#FBEFD9" : "transparent" }}>
                      <td style={{ padding: "6px 0", fontWeight: s.v === vac ? 700 : 400 }}>{s.v}%{s.v === vac ? " (현재)" : ""}</td>
                      <td style={{ textAlign: "right", color: s.net >= 0.05 ? UC.good : s.net >= 0.04 ? UC.amber : UC.red, fontWeight: 600 }}>{pct(s.net)}</td>
                      <td style={{ textAlign: "right" }}>{won(s.won)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{ fontFamily: FN, fontSize: 10.5, color: UC.sub, marginTop: 8, lineHeight: 1.5 }}>
                환율 ±10% → 원화 총투자/수익도 ±10% 직접 변동(예산이 원화이므로 환 리스크 ≈ 수익률 변동폭). 헤지 검토 권장.
              </div>
            </div>

            <div style={{ fontFamily: FN, fontSize: 10.5, color: UC.sub, marginTop: 13, lineHeight: 1.6 }}>
              ※ 가정 기반 추정치입니다. GPI는 반드시 <b>현행 렌트롤(실제 계약임대료)</b>로 입력하세요(모집임대료·만실호가 아님).
              취득세·등록면허세는 고정자산세 평가액 기준이라 개산치이며, 실제는 세무사·사법서사 확인이 필요합니다.
              비거주자 융자 가능성·금리·LTV는 은행별로 다릅니다.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function URow({ k, v, w, bold, muted, accent }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 0", borderTop: "1px solid #F0EAE0" }}>
      <span style={{ fontFamily: '"Noto Sans KR", system-ui, sans-serif', fontSize: muted ? 11.5 : 12.5, color: muted ? "#6B6357" : "#23201B", fontWeight: bold ? 700 : 400 }}>{k}</span>
      <span style={{ display: "flex", gap: 12, alignItems: "baseline" }}>
        <span style={{ fontFamily: '"Noto Sans KR", system-ui, sans-serif', fontSize: 12.5, color: accent ? "#0F766E" : "#23201B", fontWeight: bold ? 700 : 500 }}>{v}</span>
        {w && <span style={{ fontFamily: '"Noto Sans KR", system-ui, sans-serif', fontSize: 11, color: "#6B6357", minWidth: 78, textAlign: "right" }}>{w}</span>}
      </span>
    </div>
  );
}


/* ============================================================
   통합 셸 — 지역 데이터 / 물건 평가 탭
   ============================================================ */
function App() {
  const [tab, setTab] = useState("area");
  const [dark, setDark] = useState(false);
  C = dark ? DARK_C : LIGHT_C;
  UC = dark ? DARK_UC : LIGHT_UC;
  useEffect(() => { document.body.style.background = dark ? DARK_C.bg : LIGHT_C.bg; }, [dark]);
  const tabs = [["area", "지역 데이터"], ["asset", "물건 평가 (언더라이팅)"]];
  return (
    <div style={{ background: C.bg, minHeight: "100vh", fontFamily: FN }}>
      <div style={{ position: "sticky", top: 0, zIndex: 30, background: C.headerBg, backdropFilter: "blur(6px)", borderBottom: `1px solid ${C.line}` }}>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "11px 22px", display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
          <span style={{ fontFamily: FS, fontWeight: 800, fontSize: 15.5, color: C.ink, letterSpacing: -0.2 }}>오사카 부동산 매입 대시보드</span>
          <span style={{ fontFamily: FN, fontSize: 11, color: C.sub }}>24구 데이터 · 통빌딩 평가</span>
          <div style={{ display: "flex", gap: 6, marginLeft: "auto", alignItems: "center" }}>
            <button onClick={() => setDark((d) => !d)} title="다크/라이트 전환" style={{ fontFamily: FN, fontSize: 12.5, cursor: "pointer", padding: "7px 13px", borderRadius: 8, border: `1px solid ${C.line}`, background: "transparent", color: C.sub, transition: "all .15s" }}>{dark ? "라이트 모드" : "다크 모드"}</button>
            {tabs.map(([k, label]) => (
              <button key={k} onClick={() => setTab(k)} style={{
                fontFamily: FN, fontSize: 12.5, fontWeight: tab === k ? 700 : 500, cursor: "pointer",
                padding: "7px 15px", borderRadius: 8, border: `1px solid ${tab === k ? C.ink : C.line}`,
                background: tab === k ? C.ink : "transparent", color: tab === k ? C.bg : C.sub, transition: "all .15s",
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>
      {tab === "area" ? <AreaDashboard /> : <Underwriting />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
